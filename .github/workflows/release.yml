name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and package version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_name=snowflake-mcp-vscode-$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Remove stale VSIX artifacts
        run: rm -f *.vsix

      - name: Verify extension
        run: xvfb-run -a npm run verify

      - name: Publish to Marketplace
        run: npx vsce publish --packagePath "${{ steps.version.outputs.vsix_name }}"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: snowflake-mcp-vsix
          path: ${{ steps.version.outputs.vsix_name }}